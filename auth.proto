syntax="proto3";

package auth;

message LoginRequest{
    string email=1;
    string password=2;
}

message LoginResponse{
    int32 status = 1;
    string token = 2;
}

message SignupRequest{
    string name=1;
    string email=2;
    string organization=3;
    string password=4;
}

message SignupResponse{
    int32 status = 1;
}

service AuthService{
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc Signup(SignupRequest) returns (SignupResponse);
}